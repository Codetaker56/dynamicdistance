# DynamicDistance configuration (example)
#
# This is the file the mod writes to  <server>/config/dynamicdistance.properties
# on first launch. Copy it there to pre-seed settings, or just let the mod create it.
# Invalid values are auto-corrected on load; a minimum is never allowed above its maximum.
# Distances are in chunks and clamped to the engine range [2, 32].

# Master switch. false = behave exactly like vanilla (mod does nothing).
enabled=true

# Per-player view / chunk-send distance window.
#   - A player never receives more than min(their client render distance, server view-distance, maximumViewDistance).
#   - A player never receives less than minimumViewDistance.
# Set maximumViewDistance = your server.properties view-distance (the real hard cap) or lower.
minimumViewDistance=3
maximumViewDistance=32

# Per-player simulation distance window (block/entity ticking radius contributed per player).
# Derived from the player's effective view distance (clients don't send a simulation distance):
#   simulationDistance = clamp( min(effectiveView + simulationDistanceOffset, maximumSimulationDistance),
#                               minimumSimulationDistance, maximumSimulationDistance )
minimumSimulationDistance=3
maximumSimulationDistance=12
simulationDistanceOffset=0

# Debounce: after applying a player's distances, ignore further changes for this many ticks
# (20 ticks = 1 second). Stops someone spamming the render-distance slider from thrashing chunks.
updateCooldownTicks=20

# When to (re)apply a player's distances.
updateOnClientSettingsChange=true
updateOnJoin=true

# Allow /dynamicdistance set|simulation overrides. false = commands refuse to pin per-player values.
allowPerPlayerOverrides=true

# Log every applied change (per player). Handy for verifying different players get different distances.
debugLogging=false
